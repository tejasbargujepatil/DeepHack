# TechDrill — Nginx Production Config
# Place at /etc/nginx/sites-available/techdrill on EC2

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name api.yourdomain.com;

    # Redirect to HTTPS (enable after SSL cert)
    # return 301 https://$host$request_uri;

    # Logs
    access_log /var/log/nginx/techdrill-access.log;
    error_log  /var/log/nginx/techdrill-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to Node.js backend
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Health check (no rate limiting)
    location /api/health {
        proxy_pass http://localhost:5000;
    }
}

